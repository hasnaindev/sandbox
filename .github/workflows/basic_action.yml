name: "Basic Action"

on:
  push:
  workflow_dispatch:
    inputs:
      app_name:
        description: "Select App Name"
        type: string
        required: true
        default: ""

jobs:
  basic_job:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Basic Step"
        run: "echo Hello, \"${{ github.event.inputs.app_name || 'Push' }}\""
