name: Deployment
on:
  push:

jobs:
  testing-components:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Code
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: latest
      - name: Install Dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Test Components
        run: npm run test

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Code
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: latest
      - name: Install Dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Deploy
        run: echo "Deploying ..."